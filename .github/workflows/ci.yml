name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # The Go binary embeds admin/dist via //go:embed. That directory is generated
  # (gitignored), so every Go job below needs it staged before it will compile.
  # Build it once here and share it as an artifact.
  admin-ui:
    name: Build admin UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json

      - name: Build admin UI
        working-directory: admin
        run: |
          npm ci
          npm run build

      - name: Upload admin dist
        uses: actions/upload-artifact@v4
        with:
          name: admin-dist
          path: admin/dist
          if-no-files-found: error
          retention-days: 1

  test:
    name: Test (race detector)
    runs-on: ubuntu-latest
    needs: admin-ui
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Stage admin UI for embed
        uses: actions/download-artifact@v4
        with:
          name: admin-dist
          path: cmd/proxima/admin/dist

      - name: Run tests
        run: go test ./... -race -timeout 120s

  build:
    name: Build binary
    runs-on: ubuntu-latest
    needs: admin-ui
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Stage admin UI for embed
        uses: actions/download-artifact@v4
        with:
          name: admin-dist
          path: cmd/proxima/admin/dist

      - name: Build binary
        run: go build -v ./cmd/proxima

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: admin-ui
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Stage admin UI for embed
        uses: actions/download-artifact@v4
        with:
          name: admin-dist
          path: cmd/proxima/admin/dist

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
