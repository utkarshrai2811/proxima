# golangci-lint v2 configuration.
# The standard, high-signal analyzer set (errcheck, govet, ineffassign,
# staticcheck, unused). Generated code (gqlgen) is auto-excluded.
version: "2"

run:
  timeout: 5m

linters:
  default: standard
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # QF1001: De Morgan rewrite reduces readability of the intercept guard.
      # S1016: the *DTO mappers are intentional API boundaries; an explicit
      #        field-by-field literal documents the contract better than a cast.
      - linters:
          - staticcheck
        text: "(QF1001|S1016)"

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/utkarshrai2811/proxima
