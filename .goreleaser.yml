# Minimal Proxima GoReleaser config — finalized in Phase 5.
#
# Distribution uses `homebrew_casks:` (Homebrew Cask), NOT `brews:` (Formula).
# Casks are the correct primitive for pre-built binaries; switching from a
# Formula to a Cask later silently breaks `brew upgrade` for existing users.
# See PROXIMA_PLAN.md §Distribution.
version: 2

project_name: proxima

before:
  hooks:
    - go mod tidy
    - sh -c "cd admin && npm ci && npm run build"

builds:
  - id: proxima
    main: ./cmd/proxima
    binary: proxima
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64 # excluded: no meaningful adoption

archives:
  - id: default
    builds: [proxima]
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "proxima_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md

checksum:
  name_template: "proxima_checksums.txt"
  algorithm: sha256

# Homebrew Cask — correct primitive for pre-built binaries.
# DO NOT use `brews:` (Formula) — see PROXIMA_PLAN.md §Distribution.
homebrew_casks:
  - repository:
      owner: utkarshrai2811
      name: homebrew-proxima
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: utkarshrai2811
      email: utkarshr2811@gmail.com
    homepage: "https://github.com/utkarshrai2811/proxima"
    description: "Open-source HTTP toolkit for security research"
    license: MIT
    skip_upload: auto

# Scoop bucket (Windows)
scoops:
  - repository:
      owner: utkarshrai2811
      name: scoop-proxima
      token: "{{ .Env.SCOOP_BUCKET_TOKEN }}"
    commit_author:
      name: utkarshrai2811
      email: utkarshr2811@gmail.com
    homepage: "https://github.com/utkarshrai2811/proxima"
    description: "Open-source HTTP toolkit for security research"
    license: MIT
    skip_upload: auto

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: utkarshrai2811
    name: proxima
  draft: true
  prerelease: auto
  name_template: "Proxima v{{.Version}}"
