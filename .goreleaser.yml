# Proxima GoReleaser configuration.
#
# Distribution uses `homebrew_casks:` (Homebrew Cask), NOT `brews:` (Formula).
# Casks are the correct primitive for pre-built binaries; switching from a
# Formula to a Cask later silently breaks `brew upgrade` for existing users.
# The cask is macOS-only — Homebrew refuses casks on Linux. Linux users install
# via the .deb/.rpm/.apk packages (nfpms) or the tarball. See PROXIMA_PLAN.md.
version: 2

project_name: proxima

before:
  hooks:
    - go mod tidy
    # Build the admin UI and stage it where the Go binary embeds it
    # (cmd/proxima/admin/dist, matching //go:embed all:admin/dist).
    - sh -c "cd admin && npm ci && npm run build"
    - sh -c "rm -rf cmd/proxima/admin/dist && mkdir -p cmd/proxima/admin && cp -r admin/dist cmd/proxima/admin/dist"

builds:
  - id: proxima
    main: ./cmd/proxima
    binary: proxima
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64 # excluded: no meaningful adoption

archives:
  - id: default
    ids: [proxima]
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "proxima_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - CHANGELOG.md
      - PLUGINS.md

# Linux packages — built by GoReleaser and attached to the GitHub release.
# Requires no extra repositories or secrets. The binary is CGO_ENABLED=0, so
# these packages carry no dynamic-library dependencies.
nfpms:
  - id: packages
    package_name: proxima
    ids:
      - proxima
    formats:
      - deb
      - rpm
      - apk
    maintainer: "utkarshrai2811 <utkarshr2811@gmail.com>"
    homepage: "https://github.com/utkarshrai2811/proxima"
    description: "Open-source HTTP toolkit for security research"
    license: MIT
    bindir: /usr/bin
    section: utils

checksum:
  name_template: "proxima_checksums.txt"
  algorithm: sha256

# Homebrew Cask (macOS) — correct primitive for pre-built binaries.
# DO NOT use `brews:` (Formula), and DO NOT enable the cask auto-update flag
# (it tells Homebrew the app self-updates, so `brew upgrade` would skip it).
homebrew_casks:
  - repository:
      owner: utkarshrai2811
      name: homebrew-proxima
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: utkarshrai2811
      email: utkarshr2811@gmail.com
    commit_msg_template: "chore: update proxima to {{ .Tag }}"
    homepage: "https://github.com/utkarshrai2811/proxima"
    description: "Open-source HTTP toolkit for security research"
    license: MIT
    # skip_upload: auto = skip for pre-release tags (e.g. v1.0.0-beta.1)
    skip_upload: auto

# Scoop bucket (Windows). GoReleaser auto-generates the manifest with the
# correct version, URL, and hash, plus an autoupdate block for `scoop update`.
scoops:
  - repository:
      owner: utkarshrai2811
      name: scoop-proxima
      token: "{{ .Env.SCOOP_BUCKET_TOKEN }}"
    commit_author:
      name: utkarshrai2811
      email: utkarshr2811@gmail.com
    commit_msg_template: "chore: update proxima to {{ .Tag }}"
    homepage: "https://github.com/utkarshrai2811/proxima"
    description: "Open-source HTTP toolkit for security research"
    license: MIT
    skip_upload: auto

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: utkarshrai2811
    name: proxima
  # Create as a draft first — review before publishing.
  draft: true
  prerelease: auto
  name_template: "Proxima v{{.Version}}"
  header: |
    ## Proxima v{{.Version}}

    See [CHANGELOG.md](https://github.com/utkarshrai2811/proxima/blob/main/CHANGELOG.md) for full details.

    ### Install

    **macOS (Homebrew Cask):**
    ```bash
    brew tap utkarshrai2811/proxima
    brew install --cask proxima
    ```

    **Windows (Scoop):**
    ```bash
    scoop bucket add proxima https://github.com/utkarshrai2811/scoop-proxima
    scoop install proxima
    ```

    **Linux (Debian/Ubuntu):**
    ```bash
    sudo dpkg -i proxima_{{.Version}}_linux_amd64.deb
    ```

    **Linux (Fedora/RHEL):**
    ```bash
    sudo rpm -i proxima_{{.Version}}_linux_amd64.rpm
    ```

    **Linux (Alpine):**
    ```bash
    sudo apk add --allow-untrusted proxima_{{.Version}}_linux_amd64.apk
    ```

    Or download a tarball/binary from the assets below.
